# Render Blueprint — sobe a API Flask + um PostgreSQL gerenciado.
# Importe este repositório em https://dashboard.render.com → New → Blueprint.
services:
  - type: web
    name: keepr-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DATABASE_URL
        fromDatabase:
          name: keepr-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OCR_PROVIDER
        value: ocrspace
      - key: OCRSPACE_API_KEY
        value: helloworld
      # Troque pelo domínio real do frontend na Vercel após o primeiro deploy.
      - key: CORS_ORIGINS
        value: https://keepr.vercel.app

databases:
  - name: keepr-db
    databaseName: keepr
    user: keepr
    plan: free
