# Render Blueprint — sobe a API Flask.
# Banco: PostgreSQL no Neon (defina DATABASE_URL no painel — sync:false abaixo).
# Importe este repositório em https://dashboard.render.com → New → Blueprint.
services:
  - type: web
    name: keepr-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # workers=1: o APScheduler roda dentro do processo; com 2+ workers os jobs
    # diários de verificação disparariam duplicados. Mantenha 1 no plano free.
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      # Cole a connection string do Neon:
      # postgresql://usuario:senha@ep-xxx.neon.tech/keepr?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      # OCR via Gemini — gere a chave em https://aistudio.google.com/app/apikey
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      # Troque pelo domínio real do frontend na Vercel após o primeiro deploy.
      - key: CORS_ORIGINS
        value: https://keepr.vercel.app
